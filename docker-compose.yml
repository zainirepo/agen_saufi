services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agen_saufi
      POSTGRES_PASSWORD: agen_saufi_pass
      POSTGRES_DB: agen_saufi
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agen_saufi -d agen_saufi"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://agen_saufi:agen_saufi_pass@db:5432/agen_saufi?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: https://localhost:8443
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  db_data:
